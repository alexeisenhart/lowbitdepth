<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Housing Portfolio — lowbitdepth</title>
  <script type="module" crossorigin src="/assets/mortgage-KAll9tCF.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="stylesheet" crossorigin href="/assets/mortgage-0_kINvVu.css">
  <link rel="stylesheet" crossorigin href="/assets/shared-BZWWbgyz.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <a href="/" class="nav__brand">lowbitdepth</a>
    <ul class="nav__links">
      <li><a href="/" class="nav__link">Tools</a></li>
    </ul>
  </nav>

  <div class="portfolio-layout">

    <!-- LEFT: sidebar -->
    <aside class="portfolio-sidebar card" id="sidebar"></aside>

    <!-- RIGHT: main content -->
    <main class="portfolio-main">

      <!-- Horizon selector tabs -->
      <div class="segmented" id="horizon-tabs">
        <button class="segmented__btn active" data-year="0">Now</button>
        <button class="segmented__btn" data-year="2">Year 2</button>
        <button class="segmented__btn" data-year="5">Year 5</button>
        <button class="segmented__btn" data-year="10">Year 10</button>
      </div>

      <!-- Scenario comparison columns -->
      <section class="calc-section" id="comparison-grid"></section>

      <!-- Scenario timeline (decisions + net worth across years) -->
      <section class="calc-section" id="scenario-timeline"></section>

      <!-- Net worth timeline chart -->
      <section class="calc-section" id="timeline-chart"></section>

      <!-- Monthly cash flow breakdown chart -->
      <section class="calc-section" id="cashflow-chart"></section>

      <!-- Property equity table -->
      <section class="calc-section" id="equity-table"></section>

      <!-- Annual cash flow tables (one per active scenario) -->
      <section class="calc-section" id="amortization-table"></section>

    </main>
  </div>

</body>
</html>
