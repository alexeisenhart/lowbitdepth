<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Low Bit Depth</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 0;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      padding: 2rem;
      text-align: center;
      background: #020617;
      border-bottom: 1px solid #1e293b;
    }

    h1 {
      margin: 0;
      font-size: 2.5rem;
    }

    main {
      flex: 1;
      padding: 2rem;
      max-width: 800px;
      margin: 0 auto;
    }

    .card {
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    button {
      background: #22c55e;
      color: #020617;
      border: none;
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #16a34a;
    }

    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.9rem;
      border-top: 1px solid #1e293b;
      background: #020617;
    }
  </style>
</head>
<body>

  <header>
    <h1>Low Bit Depth</h1>
    <p>Minimal static site — GitHub Pages test</p>
  </header>

  <main>
    <div class="card">
      <h2>Hello 👋</h2>
      <p>If you can see this, your GitHub Pages deployment is working.</p>
    </div>

    <div class="card">
      <h2>Interactive Test</h2>
      <p>Click the button:</p>
      <button onclick="handleClick()">Click me</button>
      <p id="output"></p>
    </div>

    <div class="card">
      <h2>Next Steps</h2>
      <ul>
        <li>Hook up your TypeScript build</li>
        <li>Replace this with your actual app</li>
        <li>Style it however you want</li>
      </ul>
    </div>
  </main>

  <footer>
    © 2026 Low Bit Depth
  </footer>

  <script>
    function handleClick() {
      const el = document.getElementById("output");
      el.textContent = "Button clicked at " + new Date().toLocaleTimeString();
    }
  </script>

</body>
</html>
